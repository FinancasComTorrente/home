        .bio-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        .bio-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .bio-profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--color-accent);
            box-shadow: 0 0 20px rgba(208, 167, 71, 0.3);
            display: block;
            margin: 0 auto 1.5rem auto;
        }

        .bio-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-family: var(--font-heading);
            font-weight: 700;
        }

        .bio-subtitle {
            color: var(--color-text-muted);
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .bio-links-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 4rem;
        }

        .bio-link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--color-text);
            font-weight: 600;
            font-size: 1.1rem;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .bio-link-btn i {
            position: absolute;
            left: 1.5rem;
            font-size: 1.4rem;
            color: var(--color-accent);
        }

        .bio-link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(208, 167, 71, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(208, 167, 71, 0.15);
        }

        .bio-link-btn.primary {
            background: linear-gradient(135deg, rgba(208, 167, 71, 0.2) 0%, rgba(208, 167, 71, 0.05) 100%);
            border-color: rgba(208, 167, 71, 0.5);
        }

        .bio-link-btn.primary:hover {
            background: linear-gradient(135deg, rgba(208, 167, 71, 0.3) 0%, rgba(208, 167, 71, 0.1) 100%);
            border-color: var(--color-accent);
        }

        .bio-footer {
            margin-top: auto;
            text-align: center;
            width: 100%;
        }

        .bio-socials {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .bio-socials a {
            color: var(--color-text-muted);
            font-size: 1.8rem;
            transition: var(--transition);
        }

        .bio-socials a:hover {
            color: var(--color-accent);
            transform: translateY(-3px);
        }

        .bio-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 400px;
            opacity: 0.03;
            filter: grayscale(100%) brightness(200%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
